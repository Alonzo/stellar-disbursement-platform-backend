name: Build and Push to ECR

on:
  push:
    branches:
      - main  # Production branch
    tags:
      - 'v*'  # Build on version tags
  workflow_dispatch:  # Allow manual triggers
  pull_request:
    branches:
      - main  # Build on PRs to verify it works

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT: "084034390838"
  ECR_REPOSITORY: stellar-disbursement-platform-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # Native AMD64 - no cross-compilation!
    permissions:
      contents: read
      id-token: write  # Required for OIDC authentication
      security-events: write  # Required for uploading Trivy SARIF results

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Configure AWS credentials using OIDC (no long-lived keys!)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      # Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Set up Docker Buildx with cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run Trivy vulnerability scanner
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail build on vulnerabilities (report only)

      # Build and push with caching
      - name: Build, tag, and push image to Amazon ECR
        if: github.event_name != 'pull_request'  # Only push on main branch or tags
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64  # Native build - fast!
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # Note: ECR scanOnPush is already enabled, so images are automatically scanned

      # Build only (no push) for PRs
      - name: Build image (PR verification)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:pr-${{ github.event.pull_request.number }}

      # Upload Trivy SARIF results as artifact (bypasses GitHub Security API permissions)
      # This allows downloading the scan results without requiring GHAS permissions
      - name: Upload Trivy SARIF as artifact
        if: always() && steps.trivy.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 30

      # Install Helm
      - name: Install Helm
        if: github.event_name != 'pull_request'
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'
      
      # Configure kubectl for EKS
      - name: Configure kubectl
        if: github.event_name != 'pull_request'
        run: |
          aws eks update-kubeconfig --name floral-bluegrass-outfit --region ${{ env.AWS_REGION }}
      
      # Deploy to production using Helm
      - name: Deploy to production
        if: github.event_name != 'pull_request'
        run: |
          helm upgrade sdp-prod helmchart/sdp \
            --namespace default \
            -f helmchart/sdp/production-values.yaml \
            --set sdp.image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m
      
      # Output image info
      - name: Output image information
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Build and deployment complete!"
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "Latest: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
          echo "Deployed to production with tag: ${{ github.sha }}"

